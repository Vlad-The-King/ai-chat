<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VladGPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

/* ================= LOADING ================= */
#loadingScreen{
position:fixed;
inset:0;
background:radial-gradient(circle,#06281d,#000);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeOut .8s ease forwards;
animation-delay:4.5s;
}

.loadingText{
font-size:32px;
font-weight:800;
color:#22c55e;
animation:moveText 1.2s ease-in-out infinite;
letter-spacing:2px;
}

@keyframes moveText{
0%{transform:translateY(0);opacity:.6;}
50%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(0);opacity:.6;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* ================= APP ================= */
body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
padding:12px;
position:fixed;
left:-300px;
top:0;
bottom:0;
transition:0.35s ease;
display:flex;
flex-direction:column;
}

#sidebar.open{
left:0;
}

/* chat list */
.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

.topBar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.25);
}

.menuBtn{
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
transition:.2s;
}

.menuBtn:hover{
transform:scale(1.1);
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:14px;
}

.user{align-self:flex-end;background:#22c55e;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.12);}

/* INPUT */
#inputArea{
display:flex;
padding:12px;
background:rgba(0,0,0,0.35);
gap:10px;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button.send{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:800;
cursor:pointer;
}

/* SIDEBAR ANIMATION OVERLAY EFFECT */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(2px);
opacity:0;
pointer-events:none;
transition:.35s ease;
}

#overlay.show{
opacity:1;
pointer-events:auto;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loadingText">VladGPT</div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
<div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

<div class="topBar">
<button class="menuBtn" onclick="toggleSidebar()">•••</button>
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let conversations = JSON.parse(localStorage.getItem('vladgpt')||'[]');
let active=null;
let sidebarOpen=false;

function save(){
localStorage.setItem('vladgpt',JSON.stringify(conversations));
}

/* ================= SIDEBAR ================= */
function toggleSidebar(){
sidebarOpen=!sidebarOpen;
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
render();
}

/* ================= CHAT ================= */
function newChat(){
const c={id:Date.now(),messages:[]};
conversations.push(c);
active=c.id;
save();
render();
}

function openChat(id){
active=id;
render();
toggleSidebar();
}

function render(){
const list=document.getElementById('chatList');
list.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem';
div.innerText='•••';
div.onclick=()=>openChat(c.id);
list.appendChild(div);
});

const chat=conversations.find(c=>c.id===active);
const box=document.getElementById('chat');
box.innerHTML='';

if(!chat) return;

chat.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
box.appendChild(d);
});
}

/* ================= SEND ================= */
async function sendMessage(){
const text=input.value.trim();
if(!text||!active) return;

const chat=conversations.find(c=>c.id===active);
chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text})
});

const data=await res.json();
chat.messages.push({role:'ai',text:data.reply});

save();
render();
}

/* ENTER */
input.addEventListener('keypress',e=>{
if(e.key==='Enter') sendMessage();
});

/* INIT */
newChat();

/* LOADING REMOVE */
setTimeout(()=>{
document.getElementById('loadingScreen').remove();
},4500);

</script>

</body>
</html>
