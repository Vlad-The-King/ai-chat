<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VladGPT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#0b3d2e,#0f5a3c,#0a2f22);
color:white;
}

/* SIDEBAR */
#sidebar{
width:260px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
display:flex;
flex-direction:column;
padding:12px;
}

#newChat{
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-bottom:10px;
}

.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.chatItem.active{
background:rgba(34,197,94,0.4);
}

.deleteBtn{
background:red;
border:none;
color:white;
border-radius:6px;
padding:2px 6px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.25);
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px 14px;
border-radius:12px;
word-wrap:break-word;
animation:pop .15s ease;
}

@keyframes pop{
from{transform:scale(.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.user{
align-self:flex-end;
background:#22c55e;
color:black;
}

.ai{
align-self:flex-start;
background:rgba(255,255,255,0.12);
}

#inputArea{
display:flex;
padding:12px;
background:rgba(0,0,0,0.35);
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button.send{
margin-left:10px;
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div id="sidebar">
<button id="newChat">+ New Conversation</button>
<div id="chatList"></div>
</div>

<div id="main">
<header>VladGPT</header>
<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Type message..." />
<button class="send" onclick="sendMessage()">Enter</button>
</div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
let activeChat = null;

const chatBox = document.getElementById('chat');
const chatList = document.getElementById('chatList');
const input = document.getElementById('input');

function save(){
localStorage.setItem('conversations', JSON.stringify(conversations));
}

function newChat(){
const chat = {id:Date.now(), messages:[]};
conversations.push(chat);
activeChat = chat.id;
save();
render();
}

document.getElementById('newChat').onclick = newChat;

function selectChat(id){
activeChat = id;
render();
}

function deleteChat(id,e){
e.stopPropagation();
conversations = conversations.filter(c=>c.id!==id);
if(activeChat===id) activeChat = conversations[0]?.id || null;
save();render();
}

function render(){
chatList.innerHTML='';
chatBox.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem'+(c.id===activeChat?' active':'');
div.onclick=()=>selectChat(c.id);
div.innerHTML=`Chat ${c.id} <button class='deleteBtn' onclick='deleteChat(${c.id},event)'>x</button>`;
chatList.appendChild(div);
});

const current = conversations.find(c=>c.id===activeChat);
if(!current) return;

current.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
chatBox.appendChild(d);
});

chatBox.scrollTop=chatBox.scrollHeight;
}

async function sendMessage(){
const text=input.value.trim();
if(!text||!activeChat) return;

const chat=conversations.find(c=>c.id===activeChat);
chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
const data=await res.json();

chat.messages.push({role:'ai',text:data.reply});
save();
render();
}

input.addEventListener('keypress',e=>{
if(e.key==='Enter') sendMessage();
});

newChat();
</script>

</body>
</html>
