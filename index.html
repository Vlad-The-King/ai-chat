<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VladGPT Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
transition:.2s;
}

.chatItem:hover{
background:rgba(34,197,94,0.25);
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:12px;
text-align:center;
font-weight:800;
background:rgba(0,0,0,0.3);
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
}

.user{align-self:flex-end;background:#22c55e;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.12);}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
gap:10px;
background:rgba(0,0,0,0.4);
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button{
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.send{
background:#22c55e;
padding:12px 16px;
}

/* DELETE ANIMATION */
#deleteOverlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:.2s;
z-index:9999;
}

#deleteOverlay.show{
opacity:1;
pointer-events:auto;
}

.trash{
font-size:90px;
animation:trash 1.2s ease forwards;
}

@keyframes trash{
0%{transform:scale(.3) rotate(-20deg);opacity:0;}
40%{transform:scale(1.3) rotate(10deg);opacity:1;}
100%{transform:scale(.6);opacity:0;}
}

/* BIN BUTTON */
#binBtn{
position:fixed;
bottom:15px;
left:15px;
background:#111;
padding:10px;
border-radius:10px;
cursor:pointer;
z-index:1000;
}

/* BIN PANEL */
#binPanel{
position:fixed;
left:0;
top:0;
bottom:0;
width:260px;
background:rgba(0,0,0,0.9);
transform:translateX(-100%);
transition:.3s;
z-index:999;
padding:10px;
}

#binPanel.open{
transform:translateX(0);
}

.binItem{
padding:8px;
background:rgba(255,255,255,0.08);
margin-bottom:6px;
border-radius:8px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<!-- DELETE -->
<div id="deleteOverlay">
<div class="trash">🗑️</div>
</div>

<!-- BIN -->
<div id="binBtn" onclick="toggleBin()">🗂</div>

<div id="binPanel">
<h3>Recycle Bin</h3>
<div id="binList"></div>
</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div id="main">
<header>VladGPT Pro</header>
<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>
</div>

<script>

let conversations = JSON.parse(localStorage.getItem('vlad')||'[]');
let bin = JSON.parse(localStorage.getItem('vlad_bin')||'[]');
let active=null;

function save(){
localStorage.setItem('vlad',JSON.stringify(conversations));
localStorage.setItem('vlad_bin',JSON.stringify(bin));
}

function newChat(){
const c={id:Date.now(),messages:[]};
conversations.push(c);
active=c.id;
save();
render();
}

function getTitle(c){
return c.messages.length?c.messages[0].text.slice(0,25):"New Chat";
}

/* DELETE */
function deleteChat(id){

document.getElementById('deleteOverlay').classList.add('show');

setTimeout(()=>{

const chat=conversations.find(c=>c.id===id);
if(!chat) return;

bin.push(chat);
conversations=conversations.filter(c=>c.id!==id);

if(active===id) active=conversations[0]?.id||null;

save();
render();

document.getElementById('deleteOverlay').classList.remove('show');

showUndo(chat);

},1200);
}

/* UNDO */
function showUndo(chat){
const u=document.createElement('div');
u.innerText="Undo delete";
u.style.cssText="position:fixed;bottom:20px;right:20px;background:#22c55e;padding:10px;border-radius:10px;cursor:pointer;z-index:9999;color:black";

u.onclick=()=>{
conversations.push(chat);
bin=bin.filter(b=>b.id!==chat.id);
save();
render();
u.remove();
};

document.body.appendChild(u);
setTimeout(()=>u.remove(),5000);
}

/* BIN */
function toggleBin(){
document.getElementById('binPanel').classList.toggle('open');
renderBin();
}

function restore(id){
const item=bin.find(b=>b.id===id);
if(!item) return;

conversations.push(item);
bin=bin.filter(b=>b.id!==id);
save();
render();
renderBin();
}

/* RENDER BIN */
function renderBin(){
const box=document.getElementById('binList');
box.innerHTML='';

bin.forEach(b=>{
const d=document.createElement('div');
d.className='binItem';
d.innerHTML=`<span>${getTitle(b)}</span><button onclick="restore(${b.id})">restore</button>`;
box.appendChild(d);
});
}

/* RENDER */
function render(){
const side=document.getElementById('sidebar');
side.innerHTML='';

conversations.forEach(c=>{
const d=document.createElement('div');
d.className='chatItem';

d.innerHTML=`<span>${getTitle(c)}</span><button onclick="event.stopPropagation();deleteChat(${c.id})">🗑</button>`;

d.onclick=()=>{active=c.id;render();};

side.appendChild(d);
});

const chat=conversations.find(c=>c.id===active);
const box=document.getElementById('chat');
box.innerHTML='';

if(!chat) return;

chat.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
box.appendChild(d);
});
}

/* SEND */
async function sendMessage(){
const text=input.value.trim();
if(!text||!active) return;

const chat=conversations.find(c=>c.id===active);

chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text})
});

const data=await res.json();
chat.messages.push({role:'ai',text:data.reply});

save();
render();
}

/* ENTER */
input.addEventListener('keydown',e=>{
if(e.key==='Enter') sendMessage();
});

/* INIT */
newChat();

</script>

</body>
</html>
