<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VladGPT Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
display:flex;
flex-direction:column;
padding:12px;
}

#newChat{
padding:10px;
background:#22c55e;
border:none;
color:black;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin-bottom:10px;
transition:.2s;
}

#newChat:hover{transform:scale(1.03);}

.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
animation:fadeIn .2s ease;
}

.chatItem.active{
background:rgba(34,197,94,0.35);
}

.chatTitle{
flex:1;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.deleteBtn{
background:red;
border:none;
color:white;
border-radius:6px;
padding:3px 7px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:16px;
text-align:center;
font-size:24px;
font-weight:800;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
scroll-behavior:smooth;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:14px;
word-wrap:break-word;
animation:pop .15s ease;
line-height:1.4;
}

@keyframes pop{
from{transform:scale(.95);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.user{
align-self:flex-end;
background:#22c55e;
color:black;
}

.ai{
align-self:flex-start;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.15);
}

.typing{
opacity:.7;
font-style:italic;
}

#inputArea{
display:flex;
padding:12px;
background:rgba(0,0,0,0.35);
gap:10px;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
}

button.send{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:800;
cursor:pointer;
transition:.2s;
}

button.send:hover{transform:scale(1.05);}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div id="sidebar">
<button id="newChat">+ New Chat</button>
<div id="chatList"></div>
</div>

<div id="main">
<header>VladGPT Pro</header>
<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask something..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem('vladgpt_chats') || '[]');
let activeChat = null;

const chatBox = document.getElementById('chat');
const chatList = document.getElementById('chatList');
const input = document.getElementById('input');

function save(){
localStorage.setItem('vladgpt_chats', JSON.stringify(conversations));
}

function newChat(){
const chat = {id:Date.now(), title:"New chat", messages:[]};
conversations.unshift(chat);
activeChat = chat.id;
save();render();
}

function selectChat(id){
activeChat = id;
render();
}

function deleteChat(id,e){
e.stopPropagation();
conversations = conversations.filter(c=>c.id!==id);
if(activeChat===id) activeChat = conversations[0]?.id || null;
save();render();
}

function autoTitle(chat){
if(chat.title !== "New chat") return;
if(chat.messages.length>0){
chat.title = chat.messages[0].text.slice(0,25);
}
}

function render(){
chatList.innerHTML='';
chatBox.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem'+(c.id===activeChat?' active':'');
div.onclick=()=>selectChat(c.id);
div.innerHTML=`<div class='chatTitle'>${c.title}</div><button class='deleteBtn' onclick='deleteChat(${c.id},event)'>x</button>`;
chatList.appendChild(div);
});

const current = conversations.find(c=>c.id===activeChat);
if(!current) return;

current.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
chatBox.appendChild(d);
});

chatBox.scrollTop=chatBox.scrollHeight;
}

function addTyping(){
const d=document.createElement('div');
d.className='msg ai typing';
d.innerText='AI is typing...';
d.id='typing';
chatBox.appendChild(d);
chatBox.scrollTop=chatBox.scrollHeight;
}

function removeTyping(){
const t=document.getElementById('typing');
if(t) t.remove();
}

async function sendMessage(){
const text=input.value.trim();
if(!text||!activeChat) return;

const chat=conversations.find(c=>c.id===activeChat);
chat.messages.push({role:'user',text});
input.value='';
render();

addTyping();

const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
const data=await res.json();

removeTyping();
chat.messages.push({role:'ai',text:data.reply});
autoTitle(chat);
save();render();
}

input.addEventListener('keypress',e=>{
if(e.key==='Enter') sendMessage();
});

newChat();
</script>

</body>
</html>
