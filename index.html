<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VladGPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

/* LOADING SCREEN */
#loadingScreen{
position:fixed;
inset:0;
background:radial-gradient(circle at center,#0b3d2e,#06281d,#000);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
animation:fadeOut 0.8s ease forwards;
animation-delay:4.5s;
}

.orb{
width:90px;
height:90px;
border-radius:50%;
background:radial-gradient(circle,#22c55e,#0b3d2e);
box-shadow:0 0 40px #22c55e;
animation:spin 1.2s linear infinite, pulse 1.5s ease-in-out infinite;
margin-bottom:20px;
}

.loaderText{
font-size:34px;
font-weight:800;
color:#22c55e;
letter-spacing:2px;
animation:textGlow 1.2s infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes pulse{
0%,100%{transform:scale(1);opacity:0.7;}
50%{transform:scale(1.25);opacity:1;}
}

@keyframes textGlow{
0%,100%{text-shadow:0 0 10px #22c55e;}
50%{text-shadow:0 0 25px #22c55e;}
}

@keyframes fadeOut{
to{
opacity:0;
transform:scale(1.1);
visibility:hidden;
}
}

/* MAIN UI */
body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
display:flex;
flex-direction:column;
padding:12px;
}

#newChat{
padding:10px;
background:#22c55e;
border:none;
color:black;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin-bottom:10px;
transition:.2s;
}

#newChat:hover{transform:scale(1.03);}

.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.chatItem.active{
background:rgba(34,197,94,0.35);
}

.chatTitle{
flex:1;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.deleteBtn{
background:red;
border:none;
color:white;
border-radius:6px;
padding:3px 7px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

/* removed header text as requested */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:14px;
word-wrap:break-word;
animation:pop .15s ease;
}

@keyframes pop{
from{transform:scale(.95);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.user{align-self:flex-end;background:#22c55e;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);}

#inputArea{
display:flex;
padding:12px;
background:rgba(0,0,0,0.35);
gap:10px;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button.send{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="orb"></div>
  <div class="loaderText">VladGPT</div>
</div>

<div id="sidebar">
<button id="newChat">+ New Chat</button>
<div id="chatList"></div>
</div>

<div id="main">
<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask something..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem('vladgpt_chats') || '[]');
let activeChat = null;

const chatBox = document.getElementById('chat');
const chatList = document.getElementById('chatList');
const input = document.getElementById('input');

function save(){
localStorage.setItem('vladgpt_chats', JSON.stringify(conversations));
}

function newChat(){
const chat={id:Date.now(),title:"New chat",messages:[]};
conversations.unshift(chat);
activeChat=chat.id;
save();render();
}

function selectChat(id){
activeChat=id;
render();
}

function render(){
chatList.innerHTML='';
chatBox.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem'+(c.id===activeChat?' active':'');
div.onclick=()=>selectChat(c.id);
div.innerHTML=`<div class='chatTitle'>${c.title}</div>`;
chatList.appendChild(div);
});

const current=conversations.find(c=>c.id===activeChat);
if(!current) return;

current.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
chatBox.appendChild(d);
});
}

async function sendMessage(){
const text=input.value.trim();
if(!text||!activeChat) return;

const chat=conversations.find(c=>c.id===activeChat);
chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text})
});

const data=await res.json();
chat.messages.push({role:'ai',text:data.reply});
save();render();
}

input.addEventListener('keypress',e=>{
if(e.key==='Enter') sendMessage();
});

newChat();

/* LOADING REMOVE */
setTimeout(()=>{
document.getElementById('loadingScreen').style.opacity='0';
setTimeout(()=>{
document.getElementById('loadingScreen').remove();
},800);
},4500);
</script>

</body>
</html>
