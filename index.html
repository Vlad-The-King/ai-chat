<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>AI Chat</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  font-family: Arial;
}

.chat {
  width: 400px;
  height: 600px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  color: white;
}

input {
  padding: 15px;
  border: none;
  outline: none;
  width: 100%;
}

button {
  padding: 15px;
  border: none;
  background: #4f46e5;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #6366f1;
}

.msg {
  margin: 10px 0;
  animation: fade 0.3s ease-in;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="chat">
  <div id="messages" class="messages"></div>

  <input id="input" placeholder="Scrie mesaj..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value;
  input.value = "";

  add("Tu: " + msg);

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();
  add("AI: " + data.reply);
}

function add(text) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
