<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VladGPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:radial-gradient(circle,#061f17,#000);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
animation:fadeOut 1s ease forwards;
animation-delay:7s;
}

.ring{
width:120px;
height:120px;
border-radius:50%;
border:3px solid rgba(34,197,94,0.2);
border-top:3px solid #22c55e;
animation:spin 1s linear infinite;
position:relative;
}

.ring::after{
content:"";
position:absolute;
inset:20px;
border-radius:50%;
border:2px dashed rgba(34,197,94,0.5);
animation:spinReverse 2s linear infinite;
}

.orb{
width:18px;
height:18px;
background:#22c55e;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 30px #22c55e;
animation:pulse 1.2s infinite;
}

.loaderText{
margin-top:25px;
color:#22c55e;
font-size:30px;
font-weight:800;
animation:glow 1.5s infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes spinReverse{to{transform:rotate(-360deg);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}
@keyframes glow{0%,100%{text-shadow:0 0 10px #22c55e;}50%{text-shadow:0 0 30px #22c55e;}}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* APP */
body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
padding:12px;
display:none;
flex-direction:column;
position:relative;
}

.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.chatDots{
letter-spacing:3px;
font-weight:800;
}

.closeChat{
position:absolute;
top:10px;
right:10px;
background:red;
border:none;
color:white;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

.topBar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.25);
}

.menuBtn{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:14px;
}

.user{align-self:flex-end;background:#22c55e;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.12);}

#inputArea{
display:flex;
padding:12px;
background:rgba(0,0,0,0.35);
gap:10px;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

button.send{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="ring">
    <div class="orb"></div>
  </div>
  <div class="loaderText">VladGPT</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
<div id="chatList"></div>
</div>

<!-- MAIN -->
<div id="main">

<div class="topBar">
<button class="menuBtn" onclick="toggleSidebar()">☰</button>
<button class="menuBtn" onclick="closeChat()">✕</button>
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>

</div>

<script>
let conversations = JSON.parse(localStorage.getItem('vladgpt')||'[]');
let active=null;

function save(){
localStorage.setItem('vladgpt',JSON.stringify(conversations));
}

function toggleSidebar(){
document.getElementById('sidebar').style.display=
document.getElementById('sidebar').style.display==='flex'?'none':'flex';
render();
}

function closeChat(){
active=null;
document.getElementById('chat').innerHTML='';
}

function newChat(){
const c={id:Date.now(),messages:[]};
conversations.push(c);
active=c.id;
save();
render();
}

function openChat(id){
active=id;
render();
}

function render(){
const list=document.getElementById('chatList');
list.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem';
div.innerHTML=`<div class="chatDots">•••</div>`;
div.onclick=()=>openChat(c.id);
list.appendChild(div);
});

const chat=conversations.find(c=>c.id===active);
const box=document.getElementById('chat');
box.innerHTML='';

if(!chat) return;

chat.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
box.appendChild(d);
});
}

async function sendMessage(){
const text=input.value.trim();
if(!text||!active) return;

const chat=conversations.find(c=>c.id===active);
chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text})
});

const data=await res.json();
chat.messages.push({role:'ai',text:data.reply});
save();
render();
}

newChat();

/* LOADING 7 sec */
setTimeout(()=>{
document.getElementById('loadingScreen').remove();
},7000);
</script>

</body>
</html>
