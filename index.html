<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VladGPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:radial-gradient(circle,#06281d,#000);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeOut .8s ease forwards;
animation-delay:4.5s;
}

.loadingText{
font-size:64px;
font-weight:900;
color:#22c55e;
letter-spacing:3px;
animation:float 1.2s ease-in-out infinite;
text-shadow:0 0 25px #22c55e;
}

@keyframes float{
0%{transform:translateY(0);opacity:.6;}
50%{transform:translateY(-12px);opacity:1;}
100%{transform:translateY(0);opacity:.6;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* APP */
body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
padding:12px;
position:fixed;
left:-300px;
top:0;
bottom:0;
transition:.35s ease;
display:flex;
flex-direction:column;
}

#sidebar.open{left:0;}

.chatItem{
padding:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.chatItem:hover{
transform:scale(1.02);
background:rgba(34,197,94,0.25);
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

.topBar{
display:flex;
padding:10px;
background:rgba(0,0,0,0.25);
}

.menuBtn{
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:14px;
}

.user{align-self:flex-end;background:#22c55e;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.12);}

/* INPUT */
#inputArea{
display:flex;
padding:12px;
background:rgba(0,0,0,0.35);
gap:10px;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button.send{
padding:12px 16px;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loadingText">VladGPT</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div id="main">

<div class="topBar">
<button class="menuBtn" onclick="toggleSidebar()">•••</button>
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let conversations = JSON.parse(localStorage.getItem('vladgpt')||'[]');
let active=null;

/* INIT NEW CHAT */
function newChat(){
const c={
id:Date.now(),
title:"New Chat",
messages:[]
};
conversations.push(c);
active=c.id;
save();
render();
}

function save(){
localStorage.setItem('vladgpt',JSON.stringify(conversations));
}

/* SIDEBAR */
function toggleSidebar(){
document.getElementById('sidebar').classList.toggle('open');
}

/* GET TITLE */
function getTitle(chat){
if(!chat.messages.length) return "New Chat";
return chat.messages[0].text.slice(0,28);
}

/* RENDER */
function render(){
const sidebar=document.getElementById('sidebar');
sidebar.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem';
div.innerText=getTitle(c);
div.onclick=()=>openChat(c.id);
sidebar.appendChild(div);
});

const chat=conversations.find(c=>c.id===active);
const box=document.getElementById('chat');
box.innerHTML='';

if(!chat) return;

chat.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
box.appendChild(d);
});
}

/* OPEN CHAT */
function openChat(id){
active=id;
render();
toggleSidebar();
}

/* SEND */
async function sendMessage(){
const text=input.value.trim();
if(!text||!active) return;

const chat=conversations.find(c=>c.id===active);

chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text})
});

const data=await res.json();

chat.messages.push({role:'ai',text:data.reply});
save();
render();
}

/* ENTER */
input.addEventListener('keypress',e=>{
if(e.key==='Enter') sendMessage();
});

/* START */
newChat();

/* LOADING REMOVE */
setTimeout(()=>{
document.getElementById('loadingScreen').remove();
},4500);

</script>

</body>
</html>
