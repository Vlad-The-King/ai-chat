<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VladGPT</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background: #eaffea;
  overflow:hidden;
}

/* LOADING */
#loading {
  position:fixed;
  inset:0;
  background:#bff5bf;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner {
  width:55px;
  height:55px;
  border:5px solid white;
  border-top:5px solid #1a7f1a;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin { 100% { transform:rotate(360deg); } }

.dots {
  margin-top:10px;
  font-size:30px;
  letter-spacing:3px;
  animation:dots 1.2s infinite;
}

@keyframes dots {
  0% { opacity:0.2; }
  50% { opacity:1; }
  100% { opacity:0.2; }
}

/* HEADER */
header {
  height:55px;
  background:#c9f7c9;
  display:flex;
  align-items:center;
  padding:0 15px;
  font-weight:bold;
  font-size:18px;
}

#menuBtn {
  font-size:28px;
  cursor:pointer;
  margin-right:15px;
  transition:0.3s;
}

#menuBtn:hover {
  transform:scale(1.1);
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  top:0;
  left:-280px;
  width:280px;
  height:100%;
  background:#d9ffd9;
  padding:15px;
  transition:0.35s cubic-bezier(.77,0,.18,1);
  box-shadow:2px 0 20px rgba(0,0,0,0.1);
  backdrop-filter: blur(10px);
}

#sidebar.open {
  left:0;
}

/* CHAT */
#chat {
  height:calc(100vh - 120px);
  padding:15px;
  overflow-y:auto;
}

.msg {
  max-width:70%;
  padding:10px 12px;
  margin:8px 0;
  border-radius:14px;
  animation:fade 0.2s ease;
}

@keyframes fade {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; transform:translateY(0); }
}

.user {
  background:#9dff9d;
  margin-left:auto;
}

.ai {
  background:white;
}

/* INPUT */
#inputBox {
  display:flex;
  padding:10px;
  gap:8px;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #aaa;
  outline:none;
}

button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div class="dots">...</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Conversații</h3>
</div>

<!-- HEADER -->
<header>
  <div id="menuBtn">☰</div>
  VladGPT
</header>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputBox">
  <input id="text" placeholder="Scrie mesaj..." />
  <button onclick="send()">→</button>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const chat = document.getElementById("chat");

document.getElementById("menuBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

/* LOADING 3 sec */
setTimeout(() => {
  document.getElementById("loading").style.opacity = "0";
  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
  }, 300);
}, 3000);

/* CHAT MEMORY */
let messages = JSON.parse(localStorage.getItem("chat") || "[]");

function render(){
  chat.innerHTML = "";
  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.textContent = m.text;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}
render();

/* SEND */
async function send(){
  const input = document.getElementById("text");
  const text = input.value;
  if(!text) return;

  messages.push({role:"user", text});
  render();
  input.value = "";

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:text})
  });

  const data = await res.json();

  messages.push({role:"ai", text:data.reply});
  localStorage.setItem("chat", JSON.stringify(messages));

  render();
}
</script>

</body>
</html>
