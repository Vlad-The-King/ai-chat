<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VladGPT</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eaffea;
}

/* LOADING SCREEN */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #bff5bf;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 6px solid white;
  border-top: 6px solid green;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* HEADER */
header {
  height: 50px;
  background: #c8f7c8;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-weight: bold;
}

#menuBtn {
  font-size: 26px;
  cursor: pointer;
  margin-right: 10px;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #d9ffd9;
  padding: 10px;
  transition: 0.3s;
}

#sidebar.open {
  left: 0;
}

/* CHAT */
#chat {
  padding: 10px;
  height: calc(100vh - 120px);
  overflow-y: auto;
}

.message {
  padding: 8px;
  margin: 5px 0;
  border-radius: 10px;
}

.user { background: #aaffaa; }
.ai { background: #ffffff; }

#inputBox {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  margin-left: 5px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <h2>VladGPT</h2>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Conversații</h3>
  <div id="conversations"></div>
</div>

<!-- HEADER -->
<header>
  <div id="menuBtn">☰</div>
  <div>VladGPT</div>
</header>

<!-- CHAT -->
<div id="chat"></div>

<div id="inputBox">
  <input id="text" placeholder="Scrie mesaj..." />
  <button onclick="send()">→</button>
</div>

<script>
let sidebar = document.getElementById("sidebar");
let chat = document.getElementById("chat");

document.getElementById("menuBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

/* LOADING 4 sec */
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
}, 4000);

/* LOAD CHAT */
let messages = JSON.parse(localStorage.getItem("chat") || "[]");
render();

function render(){
  chat.innerHTML = "";
  messages.forEach(m => {
    let div = document.createElement("div");
    div.className = "message " + m.role;
    div.innerText = m.text;
    chat.appendChild(div);
  });
}

async function send(){
  let input = document.getElementById("text");
  let text = input.value;
  if(!text) return;

  messages.push({role:"user", text});
  render();
  input.value = "";

  let res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message:text})
  });

  let data = await res.json();

  messages.push({role:"ai", text: data.reply});
  localStorage.setItem("chat", JSON.stringify(messages));
  render();
}
</script>

</body>
</html>
