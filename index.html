<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VladGPT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

/* LOADING */
#loadingScreen{
position:fixed;
inset:0;
background:radial-gradient(circle,#06281d,#000);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeOut .8s ease forwards;
animation-delay:4.5s;
}

.loadingText{
font-size:64px;
font-weight:900;
color:#22c55e;
animation:float 1.2s infinite ease-in-out;
text-shadow:0 0 20px #22c55e;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* LAYOUT */
body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#06281d,#0b3d2e,#0f5a3c);
color:white;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.chatItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
cursor:pointer;
}

.chatItem:hover{
background:rgba(34,197,94,0.25);
}

.delBtn{
background:red;
border:none;
color:white;
padding:3px 7px;
border-radius:6px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:12px;
text-align:center;
font-weight:800;
background:rgba(0,0,0,0.3);
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
}

.user{align-self:flex-end;background:#22c55e;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.12);}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
gap:10px;
background:rgba(0,0,0,0.4);
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

.send{
background:#22c55e;
border:none;
padding:12px 16px;
font-weight:700;
border-radius:10px;
cursor:pointer;
}

/* CONFIRM */
#confirmBox{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:.2s;
z-index:9999;
}

#confirmBox.show{
opacity:1;
pointer-events:auto;
}

.confirm{
background:#111;
padding:20px;
border-radius:12px;
width:260px;
text-align:center;
}

.btns{
display:flex;
gap:10px;
margin-top:15px;
}

.btns button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

.yes{background:#22c55e;color:black;}
.no{background:#444;color:white;}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loadingText">VladGPT</div>
</div>

<!-- CONFIRM -->
<div id="confirmBox">
  <div class="confirm">
    <p>Are you sure you want to delete?</p>
    <div class="btns">
      <button class="no" onclick="closeConfirm()">No</button>
      <button class="yes" id="yesBtn">Yes</button>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div id="main">
<header>VladGPT</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask..." />
<button class="send" onclick="sendMessage()">Send</button>
</div>
</div>

<script>

let conversations = JSON.parse(localStorage.getItem('vlad')||'[]');
let active=null;
let deleteTarget=null;

function save(){
localStorage.setItem('vlad',JSON.stringify(conversations));
}

/* INIT */
function init(){
if(conversations.length===0) newChat();
else active=conversations[0].id;
render();
}

/* NEW CHAT */
function newChat(){
const c={id:Date.now(),messages:[]};
conversations.push(c);
active=c.id;
save();
render();
}

/* TITLE */
function title(c){
return c.messages.length?c.messages[0].text.slice(0,25):"New Chat";
}

/* DELETE FLOW */
function askDelete(id){
deleteTarget=id;
document.getElementById('confirmBox').classList.add('show');

document.getElementById('yesBtn').onclick=()=>{
conversations=conversations.filter(c=>c.id!==id);
if(active===id) active=conversations[0]?.id||null;
save();
render();
closeConfirm();
};
}

function closeConfirm(){
document.getElementById('confirmBox').classList.remove('show');
}

/* RENDER */
function render(){
const side=document.getElementById('sidebar');
side.innerHTML='';

conversations.forEach(c=>{
const div=document.createElement('div');
div.className='chatItem';

div.innerHTML=`
<span>${title(c)}</span>
<button class="delBtn" onclick="event.stopPropagation();askDelete(${c.id})">x</button>
`;

div.onclick=()=>{active=c.id;render();};

side.appendChild(div);
});

const chat=conversations.find(c=>c.id===active);
const box=document.getElementById('chat');
box.innerHTML='';

if(!chat) return;

chat.messages.forEach(m=>{
const d=document.createElement('div');
d.className='msg '+m.role;
d.innerText=m.text;
box.appendChild(d);
});
}

/* SEND */
async function sendMessage(){
const text=input.value.trim();
if(!text||!active) return;

const chat=conversations.find(c=>c.id===active);

chat.messages.push({role:'user',text});
input.value='';
render();

const res=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text})
});

const data=await res.json();
chat.messages.push({role:'ai',text:data.reply});

save();
render();
}

input.addEventListener('keydown',e=>{
if(e.key==='Enter') sendMessage();
});

setTimeout(()=>{
document.getElementById('loadingScreen').remove();
},4500);

init();

</script>

</body>
</html>
